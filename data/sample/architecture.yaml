views:
  - id: regional_end_to_end
    label: Regional End-to-End
    mode: region
    region: use1
    lanes:
      - id: cold
        label: Cold branch
      - id: normal
        label: Pre-aggregate and aggregate
      - id: hot
        label: Hot branch
      - id: slow_lane
        label: Slow-lane replay
      - id: partner
        label: Partner routes
    stages:
      - id: sourcing_apps
        label: Sourcing apps
        lane: normal
        node_ids:
          - use1.sources.web_storefront
          - use1.sources.mobile_app
          - use1.sources.partner_webhook
          - use1.sources.retail_pos
      - id: ingestion_streams
        label: Ingestion streams
        lane: normal
        node_ids:
          - use1.ingestion.orders_stream
          - use1.ingestion.mobile_events_stream
          - use1.ingestion.partner_events_stream
          - use1.ingestion.inventory_updates_stream
      - id: processing_apps
        label: Data processing applications
        lane: normal
        node_ids:
          - use1.processing.orders_app
          - use1.processing.partner_app
          - use1.processing.inventory_app
      - id: preagg_slow_queues
        label: Pre-aggregate slow queues
        lane: slow_lane
        node_ids:
          - use1.pre_agg.slow_queues
      - id: preagg_slow_processor
        label: Pre-aggregate slow processor
        lane: slow_lane
        node_ids:
          - use1.pre_agg.slow_processor
      - id: aggregate_stream
        label: Aggregate Kinesis stream
        lane: normal
        node_ids:
          - use1.aggregate.stream
      - id: cold_router
        label: Cold-tier router
        lane: cold
        node_ids:
          - use1.cold.router
      - id: cold_streams
        label: Cold streams
        lane: cold
        node_ids:
          - use1.cold.stream.products
          - use1.cold.stream.orders
      - id: cold_indexers
        label: Cold-tier indexers
        lane: cold
        node_ids:
          - use1.cold.indexers
      - id: cold_clusters
        label: Cold OpenSearch clusters
        lane: cold
        node_ids:
          - use1.cold.cluster.products
          - use1.cold.cluster.orders
      - id: cold_api
        label: Cold API read surface
        lane: cold
        node_ids:
          - use1.cold.api
      - id: hot_router
        label: Hot-tier router
        lane: hot
        node_ids:
          - use1.hot.router
      - id: hot_streams
        label: Hot streams
        lane: hot
        node_ids:
          - use1.hot.stream.products
          - use1.hot.stream.orders
      - id: hot_indexers
        label: Hot-tier indexers
        lane: hot
        node_ids:
          - use1.hot.indexers
      - id: hot_clusters
        label: Hot OpenSearch clusters
        lane: hot
        node_ids:
          - use1.hot.cluster.products
          - use1.hot.cluster.orders
      - id: hot_api
        label: Hot API read surface
        lane: hot
        node_ids:
